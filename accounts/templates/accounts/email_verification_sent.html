<!DOCTYPE html>
<html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Verification Sent</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>body{background:linear-gradient(135deg,#1a2a6c,#b21f1f,#fdbb2d);min-height:100vh;display:flex;align-items:center;justify-content:center;font-family:'Segoe UI',sans-serif}
.verification-container{background:white;border-radius:20px;padding:50px;box-shadow:0 20px 60px rgba(0,0,0,0.3);max-width:500px;width:90%;text-align:center}
.icon-circle{width:100px;height:100px;background:linear-gradient(135deg,#1a2a6c,#2d4aa8);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 25px}
.icon-circle i{font-size:45px;color:white}</style></head><body>
<div class="verification-container"><div class="icon-circle"><i class="fas fa-envelope-open-text"></i></div>
<h2>Check Your Email</h2><p>We've sent a verification email. Click the link to activate your account.</p>
{% if debug_verification_url %}
<div class="alert alert-info mt-4 text-start" role="alert">
    <h6 class="alert-heading mb-1 text-info-emphasis fw-bold"><i class="fas fa-bug me-2"></i>Developer Debug Link</h6>
    <p class="mb-2 text-secondary" style="font-size: 13px;">Since <code>DEBUG = True</code>, you can click below to verify the email address immediately:</p>
    <a href="{{ debug_verification_url }}" class="btn btn-sm btn-info text-white w-100 text-truncate" style="font-size: 13px; font-weight: 500;">Verify Account Now</a>
</div>
{% endif %}
<a href="{% url 'accounts:login' %}" class="btn btn-primary" style="background:linear-gradient(135deg,#1a2a6c,#2d4aa8);border:none;padding:12px 30px;border-radius:10px;color:white;margin-top:20px"><i class="fas fa-arrow-left me-2"></i>Back to Login</a>
</div></body></html>
