<!DOCTYPE html>
<html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Verified</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>body{background:linear-gradient(135deg,#28a745,#20c997);min-height:100vh;display:flex;align-items:center;justify-content:center;font-family:'Segoe UI',sans-serif}
.verification-container{background:white;border-radius:20px;padding:50px;box-shadow:0 20px 60px rgba(0,0,0,0.3);max-width:500px;width:90%;text-align:center}
.icon-circle{width:100px;height:100px;background:linear-gradient(135deg,#28a745,#20c997);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 25px}
.icon-circle i{font-size:45px;color:white}</style></head><body>
<div class="verification-container"><div class="icon-circle"><i class="fas fa-check-circle"></i></div>
<h2>Email Verified!</h2><p>Your email has been verified. You can now sign in.</p>
<a href="{% url 'accounts:login' %}" class="btn btn-success" style="background:linear-gradient(135deg,#28a745,#20c997);border:none;padding:12px 30px;border-radius:10px;color:white;margin-top:20px"><i class="fas fa-sign-in-alt me-2"></i>Sign In</a>
</div></body></html>
